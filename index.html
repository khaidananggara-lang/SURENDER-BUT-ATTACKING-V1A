<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮 CYBER DECK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }
        .cyber-terminal {
            max-width: 500px;
            width: 100%;
            background: rgba(8, 16, 30, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 40px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 180, 255, 0.2);
            position: relative;
            z-index: 10;
        }
        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            min-height: 420px;
            justify-content: center;
        }
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }
        .finger-icon {
            font-size: 82px;
            color: #6bcbff;
            text-shadow: 0 0 25px #00a6ff, 0 0 60px #0044ff88;
            cursor: pointer;
            padding: 16px;
            border-radius: 80px;
            background: rgba(0, 150, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        .finger-icon:active {
            transform: scale(0.92);
        }
        .scan-hint {
            color: #88ccff;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px dashed rgba(0, 200, 255, 0.3);
            text-transform: uppercase;
        }
        .blue-wave {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.5) 0%, rgba(0, 100, 255, 0) 70%);
            pointer-events: none;
            opacity: 0;
        }
        .blue-wave.active {
            opacity: 1;
            animation: pulseBlue 1.2s ease-out forwards;
        }
        @keyframes pulseBlue {
            0% {
                transform: scale(0.6);
                opacity: 0.8;
            }
            100% {
                transform: scale(6);
                opacity: 0;
            }
        }
        .blue-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0099ff55 0%, #001aff33 40%, #000814 90%);
            pointer-events: none;
            z-index: 999;
            opacity: 0;
        }
        .blue-splash.active {
            opacity: 1;
            animation: splashSpread 1s ease-out forwards;
        }
        @keyframes splashSpread {
            0% {
                opacity: 0;
                transform: scale(0.2);
            }
            40% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: scale(2.5);
            }
        }
        .hello-master {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 100%;
        }
        .hello-master h1 {
            font-size: 38px;
            font-weight: 600;
            letter-spacing: 6px;
            color: #b3f0ff;
            text-shadow: 0 0 30px #0099ff, 0 0 60px #0044ff;
            background: linear-gradient(135deg, #b3f0ff, #4dabff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .continue-btn {
            background: transparent;
            border: 1.5px solid #2ac3ff;
            color: #b3f0ff;
            padding: 14px 44px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 3px;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .continue-btn:active {
            transform: scale(0.94);
        }
        #menuScreen {
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }
        .menu-card {
            background: rgba(0, 30, 60, 0.4);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 30px;
            padding: 22px 6px;
            text-align: center;
            color: #ccf0ff;
            cursor: pointer;
        }
        .menu-card i {
            font-size: 34px;
            color: #3ebdff;
            text-shadow: 0 0 20px #0088ff77;
        }
        .menu-card span {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            display: block;
            margin-top: 4px;
        }
        .menu-card small {
            font-size: 11px;
            color: #6d9bb0;
            display: block;
            margin-top: 2px;
        }
        .menu-card:active {
            transform: scale(0.94);
        }
        .menu-card.attack {
            border-left: 4px solid #ff5e7c;
        }
        .menu-card.blocking {
            border-left: 4px solid #ffb347;
        }
        .menu-card.bugging {
            border-left: 4px solid #6fcf97;
        }
        .menu-card.extract {
            border-left: 4px solid #bb86fc;
        }
        .menu-footer {
            margin-top: 8px;
            font-size: 12px;
            color: #3d7f9e;
            letter-spacing: 2px;
            border-top: 1px solid rgba(0, 200, 255, 0.1);
            padding-top: 20px;
            text-align: center;
            width: 100%;
        }
        .glow-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #0099ff33;
            width: 110px;
            height: 110px;
            animation: spinRing 6s linear infinite;
            pointer-events: none;
            opacity: 0.5;
        }
        @keyframes spinRing {
            0% {
                transform: rotate(0deg) scale(1);
                opacity: 0.2;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: rotate(360deg) scale(1.1);
                opacity: 0.2;
            }
        }
        .fingerprint-glow {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== BLOCKING - FINGER + RAINBOW MATRIX 8 DETIK + SHIELD ===== */
        #blockingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 25, 0.95);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 30px;
            flex-direction: column;
            gap: 30px;
        }
        #blockingOverlay.active {
            display: flex;
        }

        .blocking-finger {
            font-size: 80px;
            color: #6bcbff;
            text-shadow: 0 0 40px #00a6ff, 0 0 80px #0044ff88;
            animation: fingerPulse 1s ease infinite alternate;
            z-index: 10;
        }
        @keyframes fingerPulse {
            0% {
                transform: scale(1);
                opacity: 0.7;
            }
            100% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        .blocking-shield-final {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            z-index: 10;
        }
        .blocking-shield-final.active {
            display: flex;
            animation: fadeIn 0.5s ease;
        }
        .blocking-shield-final i {
            font-size: 80px;
            color: #ffb347;
            text-shadow: 0 0 40px #ffb347, 0 0 80px #ffb34755;
        }
        .blocking-shield-final .dns-text {
            color: #6fcf97;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 2px;
            text-shadow: 0 0 30px #6fcf9755;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .blocking-close-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #ffb34766;
            color: #ffb347;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            display: none;
            z-index: 10;
        }
        .blocking-close-btn.active {
            display: inline-block;
        }
        .blocking-close-btn:active {
            transform: scale(0.94);
        }

        /* Canvas untuk hujan kode warna-warni */
        #blockingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* ===== BUGGING ===== */
        #buggingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 25, 0.93);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 30px;
        }
        #buggingOverlay.active {
            display: flex;
        }
        .bugging-box {
            background: rgba(8, 20, 45, 0.95);
            border: 1.5px solid #6fcf97;
            border-radius: 30px;
            padding: 35px 25px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px #6fcf9722;
        }
        .bugging-box h2 {
            color: #6fcf97;
            font-size: 24px;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #6fcf9755;
        }
        .bugging-box .sub {
            color: #4a9e7a;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .bugging-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 20, 40, 0.8);
            border: 1.5px solid #6fcf9766;
            border-radius: 16px;
            color: #b3f0d0;
            font-size: 20px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }
        .bugging-input:focus {
            border-color: #6fcf97;
            box-shadow: 0 0 30px #6fcf9733;
        }
        .bugging-btn {
            margin-top: 16px;
            background: transparent;
            border: 1.5px solid #6fcf97;
            color: #6fcf97;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            width: 100%;
        }
        .bugging-btn:active {
            transform: scale(0.94);
        }
        .bugging-result {
            margin-top: 16px;
            color: #ff6b6b;
            font-size: 18px;
            font-weight: 600;
            min-height: 40px;
            text-shadow: 0 0 20px #ff6b6b55;
        }
        .bugging-close-btn {
            margin-top: 16px;
            background: transparent;
            border: 1px solid #6fcf9766;
            color: #6fcf97;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            width: 100%;
        }
        .bugging-close-btn:active {
            transform: scale(0.94);
        }

        /* ===== EXTRACT ===== */
        #extractOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 25, 0.93);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }
        #extractOverlay.active {
            display: flex;
        }

        .extract-box {
            background: rgba(8, 20, 45, 0.95);
            border: 1.5px solid #bb86fc;
            border-radius: 30px;
            padding: 30px 20px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px #bb86fc22;
            position: relative;
        }
        .extract-box .next-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: transparent;
            border: 1px solid #bb86fc66;
            color: #bb86fc;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 1px;
            display: none;
        }
        .extract-box .next-btn.active {
            display: inline-block;
        }
        .extract-box .next-btn:active {
            transform: scale(0.94);
        }
        .extract-box h2 {
            color: #bb86fc;
            font-size: 22px;
            letter-spacing: 3px;
            margin-bottom: 16px;
            text-shadow: 0 0 20px #bb86fc55;
        }
        .extract-file-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 16px 0;
        }
        .extract-file-btn {
            background: rgba(0, 30, 60, 0.5);
            border: 1px solid #bb86fc44;
            border-radius: 16px;
            padding: 12px 4px;
            color: #b3d4ff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .extract-file-btn:active {
            transform: scale(0.92);
        }
        .extract-file-btn.done {
            border-color: #6fcf97;
            background: rgba(111, 207, 151, 0.15);
            color: #6fcf97;
        }
        .extract-file-btn.blocked {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }

        .extract-ip-section {
            display: none;
            margin-top: 12px;
            gap: 10px;
            flex-direction: column;
        }
        .extract-ip-section.active {
            display: flex;
        }
        .extract-ip-input {
            padding: 12px 16px;
            background: rgba(0, 20, 40, 0.8);
            border: 1.5px solid #bb86fc66;
            border-radius: 14px;
            color: #d4bfff;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
            width: 100%;
        }
        .extract-ip-input:focus {
            border-color: #bb86fc;
            box-shadow: 0 0 30px #bb86fc33;
        }
        .extract-ok-btn {
            background: transparent;
            border: 1.5px solid #bb86fc;
            color: #bb86fc;
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
        }
        .extract-ok-btn:active {
            transform: scale(0.94);
        }

        .extract-progress-section {
            display: none;
            margin-top: 16px;
            flex-direction: column;
            gap: 10px;
        }
        .extract-progress-section.active {
            display: flex;
        }
        .extract-progress-bar-wrap {
            width: 100%;
            height: 12px;
            background: #1a2a45;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid #bb86fc44;
        }
        .extract-progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #6f42c1, #bb86fc, #6f42c1);
            background-size: 200% 100%;
            border-radius: 30px;
            transition: width 0.1s linear;
            animation: shimmer 0.6s linear infinite;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }
        .extract-progress-text {
            color: #a78cd6;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .extract-result-text {
            color: #6fcf97;
            font-size: 18px;
            font-weight: 600;
            margin-top: 8px;
            text-shadow: 0 0 30px #6fcf9755;
            display: none;
        }
        .extract-result-text.active {
            display: block;
        }

        .extract-close-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid #bb86fc66;
            color: #bb86fc;
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
        }
        .extract-close-btn:active {
            transform: scale(0.94);
        }

        .extract-block-all-btn {
            margin-top: 10px;
            background: transparent;
            border: 1px solid #ff6b6b66;
            color: #ff6b6b;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .extract-block-all-btn:active {
            transform: scale(0.94);
        }

        /* ===== ATTACK ===== */
        #attackOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #attackOverlay.active {
            display: flex;
        }
        #attackCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .attack-success {
            position: relative;
            z-index: 10;
            color: #00ff41;
            font-size: 48px;
            font-weight: 700;
            text-shadow: 0 0 40px #00ff41;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 50px;
            border-radius: 20px;
            border: 2px solid #00ff4166;
            display: none;
        }
        .attack-success.active {
            display: block;
        }
        .attack-close-btn {
            position: relative;
            z-index: 10;
            margin-top: 40px;
            background: transparent;
            border: 1px solid #00ff4166;
            color: #00ff41;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            letter-spacing: 2px;
            display: none;
        }
        .attack-close-btn.active {
            display: block;
        }

        @media (max-width: 430px) {
            .hello-master h1 {
                font-size: 28px;
            }
            .attack-success {
                font-size: 28px;
                padding: 16px 24px;
            }
            .blocking-finger {
                font-size: 60px;
            }
            .blocking-shield-final i {
                font-size: 60px;
            }
            .extract-file-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }
            .extract-file-btn {
                font-size: 11px;
                padding: 10px 4px;
            }
        }
    </style>
</head>
<body>
    <!-- SPLASH -->
    <div id="blueSplash" class="blue-splash"></div>

    <div class="cyber-terminal">
        <!-- LOGIN -->
        <div id="loginScreen" class="screen">
            <div class="fingerprint-glow">
                <div class="glow-ring"></div>
                <div id="blueWave" class="blue-wave"></div>
                <div id="fingerIcon" class="finger-icon">
                    <i class="fas fa-fingerprint"></i>
                </div>
            </div>
            <div class="scan-hint"><i class="fas fa-scan"></i> TEKAN SIDIK JARI</div>
            <div style="color: #397e9e; font-size: 12px; padding: 6px 20px; border-radius: 40px; background: #00162255;">
                <i class="fas fa-shield-alt" style="margin-right: 8px;"></i> biometrik terenkripsi
            </div>
        </div>

        <!-- HELLO MASTER -->
        <div id="helloMaster" class="hello-master screen">
            <h1>⚡ HELLO MASTER</h1>
            <button id="continueBtn" class="continue-btn">
                <i class="fas fa-arrow-right"></i> CONTINUE
            </button>
        </div>

        <!-- MENU -->
        <div id="menuScreen" class="screen">
            <div style="display: flex; justify-content: space-between; width: 100%; padding: 0 6px;">
                <span style="color: #82c2e0; font-size: 13px;"><i class="fas fa-terminal" style="margin-right: 6px;"></i>ROOT</span>
                <span style="color: #3d7f9e; font-size: 11px;"><i class="fas fa-circle" style="color: #00ff88; font-size: 8px;"></i> ONLINE</span>
            </div>
            <div class="menu-grid">
                <div class="menu-card attack" id="attackBtn"><i class="fas fa-skull-crossbones"></i><span>ATTACK</span><small>#exploit</small></div>
                <div class="menu-card blocking" id="blockingBtn"><i class="fas fa-shield-halved"></i><span>BLOCKING</span><small>#firewall</small></div>
                <div class="menu-card bugging" id="buggingBtn"><i class="fas fa-bug"></i><span>BUGGING</span><small>#spy</small></div>
                <div class="menu-card extract" id="extractBtn"><i class="fas fa-database"></i><span>EXTRACT</span><small>#dump</small></div>
            </div>
            <div class="menu-footer"><i class="fas fa-lock"></i> SESSION: MASTER <i class="fas fa-circle" style="color: #3ebdff; font-size: 6px; margin: 0 6px;"></i> 0x7F</div>
        </div>
    </div>

    <!-- ATTACK -->
    <div id="attackOverlay">
        <canvas id="attackCanvas"></canvas>
        <div id="attackSuccess" class="attack-success">💀 100% SUCCESS</div>
        <button id="attackCloseBtn" class="attack-close-btn"><i class="fas fa-times"></i> CLOSE</button>
    </div>

    <!-- BLOCKING - FINGER + RAINBOW MATRIX 8 DETIK + SHIELD -->
    <div id="blockingOverlay">
        <canvas id="blockingCanvas"></canvas>
        <div class="blocking-finger" id="blockingFinger"><i class="fas fa-fingerprint"></i></div>
        <div class="blocking-shield-final" id="blockingShieldFinal">
            <i class="fas fa-shield-halved"></i>
            <div class="dns-text">Your custom DNS has activation</div>
        </div>
        <button class="blocking-close-btn" id="blockingCloseBtn"><i class="fas fa-times"></i> CLOSE</button>
    </div>

    <!-- BUGGING -->
    <div id="buggingOverlay">
        <div class="bugging-box">
            <h2><i class="fas fa-bug"></i> BUGGING</h2>
            <div class="sub">MASUKKAN IP TARGET</div>
            <input type="text" id="buggingInput" class="bugging-input" placeholder="contoh: 192.168.1.1" autofocus>
            <button id="buggingSubmitBtn" class="bugging-btn"><i class="fas fa-skull"></i> CRASH</button>
            <div id="buggingResult" class="bugging-result"></div>
            <button id="buggingCloseBtn" class="bugging-close-btn"><i class="fas fa-times"></i> CLOSE</button>
        </div>
    </div>

    <!-- EXTRACT -->
    <div id="extractOverlay">
        <div class="extract-box">
            <button class="next-btn" id="extractNextBtn"><i class="fas fa-arrow-right"></i> NEXT</button>
            <h2><i class="fas fa-database"></i> EXTRACT FILES</h2>

            <div class="extract-file-grid" id="extractFileGrid">
                <button class="extract-file-btn" data-file="ddos">ddos</button>
                <button class="extract-file-btn" data-file="malware">malware</button>
                <button class="extract-file-btn" data-file="ransomfirm">ransomfirm</button>
                <button class="extract-file-btn" data-file="node.js">node.js</button>
                <button class="extract-file-btn" data-file="flicking.js">flicking.js</button>
                <button class="extract-file-btn" data-file="c++">c++</button>
            </div>

            <button class="extract-block-all-btn" id="extractBlockAllBtn"><i class="fas fa-ban"></i> BLOCK ALL</button>

            <div class="extract-ip-section" id="extractIpSection">
                <input type="text" id="extractIpInput" class="extract-ip-input" placeholder="masukkan ip target...">
                <button class="extract-ok-btn" id="extractOkBtn"><i class="fas fa-check"></i> OK</button>
            </div>

            <div class="extract-progress-section" id="extractProgressSection">
                <div class="extract-progress-bar-wrap">
                    <div class="extract-progress-bar" id="extractProgressBar" style="width:0%"></div>
                </div>
                <div class="extract-progress-text" id="extractProgressText">0%</div>
                <div class="extract-result-text" id="extractResultText"><i class="fas fa-check-circle"></i> the file is extracting to ip: </div>
            </div>

            <button class="extract-close-btn" id="extractCloseBtn"><i class="fas fa-times"></i> CLOSE</button>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // ===== ELEMENTS =====
            const loginScreen = document.getElementById('loginScreen');
            const helloMaster = document.getElementById('helloMaster');
            const menuScreen = document.getElementById('menuScreen');
            const fingerIcon = document.getElementById('fingerIcon');
            const blueWave = document.getElementById('blueWave');
            const blueSplash = document.getElementById('blueSplash');
            const continueBtn = document.getElementById('continueBtn');

            const attackBtn = document.getElementById('attackBtn');
            const attackOverlay = document.getElementById('attackOverlay');
            const attackSuccess = document.getElementById('attackSuccess');
            const attackCloseBtn = document.getElementById('attackCloseBtn');
            const attackCanvas = document.getElementById('attackCanvas');
            const attackCtx = attackCanvas.getContext('2d');

            const blockingBtn = document.getElementById('blockingBtn');
            const blockingOverlay = document.getElementById('blockingOverlay');
            const blockingCanvas = document.getElementById('blockingCanvas');
            const blockingCtx = blockingCanvas.getContext('2d');
            const blockingFinger = document.getElementById('blockingFinger');
            const blockingShieldFinal = document.getElementById('blockingShieldFinal');
            const blockingCloseBtn = document.getElementById('blockingCloseBtn');

            const buggingBtn = document.getElementById('buggingBtn');
            const buggingOverlay = document.getElementById('buggingOverlay');
            const buggingInput = document.getElementById('buggingInput');
            const buggingSubmitBtn = document.getElementById('buggingSubmitBtn');
            const buggingResult = document.getElementById('buggingResult');
            const buggingCloseBtn = document.getElementById('buggingCloseBtn');

            const extractBtn = document.getElementById('extractBtn');
            const extractOverlay = document.getElementById('extractOverlay');
            const extractFileBtns = document.querySelectorAll('.extract-file-btn');
            const extractBlockAllBtn = document.getElementById('extractBlockAllBtn');
            const extractIpSection = document.getElementById('extractIpSection');
            const extractIpInput = document.getElementById('extractIpInput');
            const extractOkBtn = document.getElementById('extractOkBtn');
            const extractProgressSection = document.getElementById('extractProgressSection');
            const extractProgressBar = document.getElementById('extractProgressBar');
            const extractProgressText = document.getElementById('extractProgressText');
            const extractResultText = document.getElementById('extractResultText');
            const extractNextBtn = document.getElementById('extractNextBtn');
            const extractCloseBtn = document.getElementById('extractCloseBtn');

            // ===== STATE =====
            let isLoggedIn = false;
            let isAttacking = false;
            let isBlocking = false;
            let attackAnimId = null;
            let blockingAnimId = null;

            // EXTRACT STATE
            let selectedFile = null;
            let extractedFiles = [];
            let isExtracting = false;
            let isBlockAllMode = false;
            let isNextMode = false;

            // ===== LOGIN =====
            function triggerBlueSplash() {
                blueSplash.classList.remove('active');
                void blueSplash.offsetWidth;
                blueSplash.classList.add('active');
                setTimeout(() => { blueSplash.classList.remove('active'); }, 1200);
            }

            function showHelloMaster() {
                loginScreen.style.display = 'none';
                helloMaster.style.display = 'flex';
            }

            function showMenu() {
                helloMaster.style.display = 'none';
                menuScreen.style.display = 'flex';
            }

            function handleFingerScan() {
                if (isLoggedIn) return;
                blueWave.classList.remove('active');
                void blueWave.offsetWidth;
                blueWave.classList.add('active');
                triggerBlueSplash();
                setTimeout(() => {
                    if (!isLoggedIn) {
                        isLoggedIn = true;
                        showHelloMaster();
                    }
                }, 1000);
            }

            fingerIcon.addEventListener('click', handleFingerScan);
            fingerIcon.addEventListener('touchstart', function(e) { e.preventDefault();
                handleFingerScan(); }, { passive: false });

            continueBtn.addEventListener('click', function() { if (isLoggedIn) showMenu(); });
            continueBtn.addEventListener('touchstart', function(e) { e.preventDefault();
                if (isLoggedIn) showMenu(); }, { passive: false });

            // ===== ATTACK =====
            function initAttackCanvas() {
                attackCanvas.width = window.innerWidth;
                attackCanvas.height = window.innerHeight;
            }

            function startMatrixRain() {
                if (isAttacking) return;
                isAttacking = true;

                initAttackCanvas();
                attackOverlay.classList.add('active');
                attackSuccess.classList.remove('active');
                attackSuccess.style.display = 'none';
                attackCloseBtn.classList.remove('active');
                attackCloseBtn.style.display = 'none';

                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
                const columns = Math.floor(attackCanvas.width / 14);
                const drops = Array(columns).fill(1);

                function drawRain() {
                    attackCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    attackCtx.fillRect(0, 0, attackCanvas.width, attackCanvas.height);
                    attackCtx.fillStyle = '#00ff41';
                    attackCtx.font = '16px monospace';
                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        const x = i * 14;
                        const y = drops[i] * 16;
                        attackCtx.fillText(text, x, y);
                        if (y > attackCanvas.height && Math.random() > 0.975) { drops[i] = 0; }
                        drops[i]++;
                    }
                    attackAnimId = requestAnimationFrame(drawRain);
                }

                drawRain();

                setTimeout(() => {
                    if (attackAnimId) { cancelAnimationFrame(attackAnimId);
                        attackAnimId = null; }
                    attackCtx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                    attackCtx.fillRect(0, 0, attackCanvas.width, attackCanvas.height);
                    attackSuccess.style.display = 'block';
                    setTimeout(() => { attackSuccess.classList.add('active'); }, 50);
                    attackCloseBtn.style.display = 'block';
                    setTimeout(() => { attackCloseBtn.classList.add('active'); }, 100);
                    isAttacking = false;
                }, 3000);
            }

            function closeAttack() {
                if (attackAnimId) { cancelAnimationFrame(attackAnimId);
                    attackAnimId = null; }
                attackOverlay.classList.remove('active');
                attackSuccess.classList.remove('active');
                attackSuccess.style.display = 'none';
                attackCloseBtn.classList.remove('active');
                attackCloseBtn.style.display = 'none';
                attackCtx.clearRect(0, 0, attackCanvas.width, attackCanvas.height);
                isAttacking = false;
            }

            attackBtn.addEventListener('click', startMatrixRain);
            attackBtn.addEventListener('touchstart', function(e) { e.preventDefault();
                startMatrixRain(); }, { passive: false });
            attackCloseBtn.addEventListener('click', closeAttack);
            attackCloseBtn.addEventListener('touchstart', function(e) { e.preventDefault();
                closeAttack(); }, { passive: false });

            window.addEventListener('resize', function() {
                if (attackOverlay.classList.contains('active')) { initAttackCanvas(); }
            });

            // ===== BLOCKING =====
            function initBlockingCanvas() {
                blockingCanvas.width = window.innerWidth;
                blockingCanvas.height = window.innerHeight;
            }

            function startBlocking() {
                if (isBlocking) return;
                isBlocking = true;

                initBlockingCanvas();
                blockingOverlay.classList.add('active');
                blockingFinger.style.display = 'block';
                blockingShieldFinal.classList.remove('active');
                blockingShieldFinal.style.display = 'none';
                blockingCloseBtn.classList.remove('active');
                blockingCloseBtn.style.display = 'none';

                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
                const colors = ['#ff6b6b', '#ffb347', '#ffd93d', '#6fcf97', '#4dabf7', '#bb86fc', '#ff6bff', '#00ff41'];
                const columns = Math.floor(blockingCanvas.width / 14);
                const drops = Array(columns).fill(1);

                function drawRainbowRain() {
                    blockingCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    blockingCtx.fillRect(0, 0, blockingCanvas.width, blockingCanvas.height);
                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        const x = i * 14;
                        const y = drops[i] * 16;
                        const color = colors[Math.floor(Math.random() * colors.length)];
                        blockingCtx.fillStyle = color;
                        blockingCtx.font = '16px monospace';
                        blockingCtx.shadowColor = color;
                        blockingCtx.shadowBlur = 10;
                        blockingCtx.fillText(text, x, y);
                        blockingCtx.shadowBlur = 0;
                        if (y > blockingCanvas.height && Math.random() > 0.975) { drops[i] = 0; }
                        drops[i]++;
                    }
                    blockingAnimId = requestAnimationFrame(drawRainbowRain);
                }

                drawRainbowRain();

                setTimeout(() => {
                    if (blockingAnimId) { cancelAnimationFrame(blockingAnimId);
                        blockingAnimId = null; }
                    blockingCtx.clearRect(0, 0, blockingCanvas.width, blockingCanvas.height);
                    blockingFinger.style.display = 'none';
                    blockingShieldFinal.style.display = 'flex';
                    setTimeout(() => { blockingShieldFinal.classList.add('active'); }, 50);
                    blockingCloseBtn.style.display = 'inline-block';
                    setTimeout(() => { blockingCloseBtn.classList.add('active'); }, 100);
                    isBlocking = false;
                }, 8000);
            }

            function closeBlocking() {
                if (blockingAnimId) { cancelAnimationFrame(blockingAnimId);
                    blockingAnimId = null; }
                blockingOverlay.classList.remove('active');
                blockingCloseBtn.classList.remove('active');
                blockingCloseBtn.style.display = 'none';
                blockingShieldFinal.classList.remove('active');
                blockingShieldFinal.style.display = 'none';
                blockingFinger.style.display = 'block';
                blockingCtx.clearRect(0, 0, blockingCanvas.width, blockingCanvas.height);
                isBlocking = false;
            }

            blockingBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                startBlocking();
            });
            blockingBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                blockingBtn.click();
            }, { passive: false });

            blockingCloseBtn.addEventListener('click', closeBlocking);
            blockingCloseBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                closeBlocking();
            }, { passive: false });

            window.addEventListener('resize', function() {
                if (blockingOverlay.classList.contains('active')) { initBlockingCanvas(); }
            });

            // ===== BUGGING =====
            function handleBugging() {
                const ip = buggingInput.value.trim();
                if (ip === '') {
                    buggingResult.textContent = '⚠️ MASUKKAN IP!';
                    buggingResult.style.color = '#ffb347';
                    return;
                }
                const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
                if (!ipRegex.test(ip)) {
                    buggingResult.textContent = '❌ IP TIDAK VALID!';
                    buggingResult.style.color = '#ff6b6b';
                    return;
                }
                buggingResult.textContent = '💀 the IP ' + ip + ' has crashing';
                buggingResult.style.color = '#ff6b6b';
                buggingResult.style.textShadow = '0 0 30px #ff6b6b55';
                buggingInput.value = '';
            }

            buggingBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                buggingOverlay.classList.add('active');
                buggingInput.value = '';
                buggingResult.textContent = '';
                setTimeout(() => buggingInput.focus(), 300);
            });
            buggingBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                buggingBtn.click();
            }, { passive: false });

            buggingSubmitBtn.addEventListener('click', function(e) {
                e.preventDefault();
                handleBugging();
            });
            buggingInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleBugging();
                }
            });

            function closeBugging() {
                buggingOverlay.classList.remove('active');
                buggingResult.textContent = '';
            }
            buggingCloseBtn.addEventListener('click', closeBugging);
            buggingCloseBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                closeBugging();
            }, { passive: false });

            // ===== EXTRACT =====
            function resetExtractUI() {
                extractIpSection.classList.remove('active');
                extractProgressSection.classList.remove('active');
                extractResultText.classList.remove('active');
                extractResultText.style.display = 'none';
                extractProgressBar.style.width = '0%';
                extractProgressText.textContent = '0%';
                extractNextBtn.classList.remove('active');
                extractNextBtn.style.display = 'none';
                selectedFile = null;
                isExtracting = false;
                isBlockAllMode = false;
                isNextMode = false;
                extractFileBtns.forEach(btn => {
                    btn.classList.remove('done', 'blocked');
                });
            }

            function runExtractProcess(ip, fileNames) {
                if (isExtracting) return;
                isExtracting = true;

                extractIpSection.classList.remove('active');
                extractProgressSection.classList.add('active');
                extractProgressBar.style.width = '0%';
                extractProgressText.textContent = '0%';
                extractResultText.classList.remove('active');
                extractResultText.style.display = 'none';

                let progress = 0;
                const timer = setInterval(() => {
                    progress += 1;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(timer);
                        extractProgressBar.style.width = '100%';
                        extractProgressText.textContent = '100%';

                        const fileList = fileNames.join(', ');
                        extractResultText.textContent = '📁 the file ' + fileList + ' is extracting to ip: ' + ip;
                        extractResultText.style.display = 'block';
                        setTimeout(() => { extractResultText.classList.add('active'); }, 50);

                        fileNames.forEach(fname => {
                            extractFileBtns.forEach(btn => {
                                if (btn.dataset.file === fname) {
                                    btn.classList.remove('blocked');
                                    btn.classList.add('done');
                                    if (!extractedFiles.includes(fname)) {
                                        extractedFiles.push(fname);
                                    }
                                }
                            });
                        });

                        if (extractedFiles.length >= 6) {
                            extractNextBtn.style.display = 'inline-block';
                            setTimeout(() => { extractNextBtn.classList.add('active'); }, 100);
                        }

                        isExtracting = false;
                    } else {
                        extractProgressBar.style.width = progress + '%';
                        extractProgressText.textContent = progress + '%';
                    }
                }, 50);
            }

            extractFileBtns.forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    if (isExtracting) return;
                    if (this.classList.contains('done') || this.classList.contains('blocked')) return;
                    if (isNextMode) return;

                    selectedFile = this.dataset.file;
                    extractIpSection.classList.add('active');
                    extractIpInput.value = '';
                    extractIpInput.focus();
                    extractResultText.classList.remove('active');
                    extractResultText.style.display = 'none';
                    extractProgressSection.classList.remove('active');
                });
            });

            extractOkBtn.addEventListener('click', function() {
                const ip = extractIpInput.value.trim();
                if (ip === '') return;
                const ipRegex = /^(\d{1,3}\.){3}\d{1,3}$/;
                if (!ipRegex.test(ip)) {
                    alert('IP tidak valid!');
                    return;
                }
                if (selectedFile) {
                    runExtractProcess(ip, [selectedFile]);
                    selectedFile = null;
                } else if (isBlockAllMode) {
                    const allFiles = ['ddos', 'malware', 'ransomfirm', 'node.js', 'flicking.js', 'c++'];
                    runExtractProcess(ip, allFiles);
                    isBlockAllMode = false;
                } else if (isNextMode) {
                    const allFiles = ['ddos', 'malware', 'ransomfirm', 'node.js', 'flicking.js', 'c++'];
                    runExtractProcess(ip, allFiles);
                    isNextMode = false;
                    extractNextBtn.classList.remove('active');
                    extractNextBtn.style.display = 'none';
                }
            });

            extractBlockAllBtn.addEventListener('click', function() {
                if (isExtracting) return;
                if (extractedFiles.length >= 6) return;

                extractFileBtns.forEach(btn => {
                    if (!btn.classList.contains('done')) {
                        btn.classList.add('blocked');
                    }
                });

                isBlockAllMode = true;
                extractIpSection.classList.add('active');
                extractIpInput.value = '';
                extractIpInput.focus();
                extractResultText.classList.remove('active');
                extractResultText.style.display = 'none';
                extractProgressSection.classList.remove('active');
            });

            extractNextBtn.addEventListener('click', function() {
                if (extractedFiles.length < 6) return;
                if (isExtracting) return;

                isNextMode = true;
                extractIpSection.classList.add('active');
                extractIpInput.value = '';
                extractIpInput.focus();
                extractResultText.classList.remove('active');
                extractResultText.style.display = 'none';
                extractProgressSection.classList.remove('active');
            });

            extractBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                resetExtractUI();
                extractedFiles = [];
                extractFileBtns.forEach(btn => {
                    btn.classList.remove('done', 'blocked');
                });
                extractOverlay.classList.add('active');
            });
            extractBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                extractBtn.click();
            }, { passive: false });

            function closeExtract() {
                extractOverlay.classList.remove('active');
                resetExtractUI();
                extractedFiles = [];
                isNextMode = false;
            }

            extractCloseBtn.addEventListener('click', closeExtract);
            extractCloseBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                closeExtract();
            }, { passive: false });

            // ===== MENU LAIN =====
            document.querySelectorAll('.menu-card:not(.attack):not(.blocking):not(.bugging):not(.extract)').forEach(card => {
                card.addEventListener('click', function() {
                    this.style.transform = 'scale(0.92)';
                    setTimeout(() => { this.style.transform = ''; }, 150);
                    const smallEl = this.querySelector('small');
                    if (smallEl) {
                        const originalText = smallEl.innerText;
                        smallEl.innerText = '✓ executing';
                        setTimeout(() => { smallEl.innerText = originalText; }, 600);
                    }
                });
            });

            console.log('🔮 CYBER DECK siap.');
        })();
    </script>
</body>
    </html>
