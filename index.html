<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔮 CYBER DECK · MASTER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Courier New', monospace;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #020408);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }
        .cyber-terminal {
            max-width: 500px;
            width: 100%;
            background: rgba(8, 16, 30, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 40px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 30px rgba(0, 180, 255, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 10;
        }
        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            min-height: 420px;
            justify-content: center;
            transition: opacity 0.6s ease;
        }
        #loginScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
        }
        .finger-icon {
            font-size: 82px;
            color: #6bcbff;
            text-shadow: 0 0 25px #00a6ff, 0 0 60px #0044ff88;
            transition: 0.2s;
            cursor: pointer;
            user-select: none;
            padding: 16px;
            border-radius: 80px;
            background: rgba(0, 150, 255, 0.05);
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        .finger-icon:active {
            transform: scale(0.92);
            color: #a3e0ff;
            text-shadow: 0 0 45px #0088ff, 0 0 90px #0044ff;
        }
        .scan-hint {
            color: #88ccff;
            font-size: 14px;
            letter-spacing: 2px;
            background: rgba(0, 255, 255, 0.04);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px dashed rgba(0, 200, 255, 0.3);
            backdrop-filter: blur(4px);
            font-weight: 300;
            text-transform: uppercase;
        }
        .scan-hint i {
            margin-right: 10px;
            color: #4fc3ff;
        }
        .fingerprint-glow {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .blue-wave {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.5) 0%, rgba(0, 100, 255, 0) 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            animation: none;
        }
        .blue-wave.active {
            opacity: 1;
            animation: pulseBlue 1.2s ease-out forwards;
        }
        @keyframes pulseBlue {
            0% { transform: scale(0.6); opacity: 0.8; }
            100% { transform: scale(6); opacity: 0; }
        }
        .blue-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #0099ff55 0%, #001aff33 40%, #000814 90%);
            pointer-events: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .blue-splash.active {
            opacity: 1;
            animation: splashSpread 1s ease-out forwards;
        }
        @keyframes splashSpread {
            0% { opacity: 0; transform: scale(0.2); }
            40% { opacity: 1; }
            100% { opacity: 0; transform: scale(2.5); }
        }
        .hello-master {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            animation: fadeGlow 0.8s ease;
            width: 100%;
        }
        @keyframes fadeGlow {
            0% { opacity: 0; text-shadow: 0 0 0 #00a6ff; }
            100% { opacity: 1; text-shadow: 0 0 40px #0088ff, 0 0 80px #0044ff; }
        }
        .hello-master h1 {
            font-size: 38px;
            font-weight: 600;
            letter-spacing: 6px;
            color: #b3f0ff;
            text-shadow: 0 0 30px #0099ff, 0 0 60px #0044ff;
            background: linear-gradient(135deg, #b3f0ff, #4dabff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 25px #0077ff55);
        }
        .continue-btn {
            background: transparent;
            border: 1.5px solid #2ac3ff;
            color: #b3f0ff;
            padding: 14px 44px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 3px;
            backdrop-filter: blur(4px);
            background: rgba(0, 150, 255, 0.08);
            box-shadow: 0 0 20px #0077ff33;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .continue-btn i {
            font-size: 20px;
        }
        .continue-btn:active {
            transform: scale(0.94);
            background: rgba(0, 200, 255, 0.2);
            box-shadow: 0 0 45px #0088ff;
        }
        #menuScreen {
            display: none;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            animation: menuSlide 0.5s ease;
        }
        @keyframes menuSlide {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
        }
        .menu-card {
            background: rgba(0, 30, 60, 0.4);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-radius: 30px;
            padding: 22px 6px;
            text-align: center;
            color: #ccf0ff;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.5);
            transition: 0.15s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .menu-card i {
            font-size: 34px;
            color: #3ebdff;
            text-shadow: 0 0 20px #0088ff77;
            margin-bottom: 4px;
        }
        .menu-card span {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #b3e4ff;
        }
        .menu-card small {
            font-size: 11px;
            color: #6d9bb0;
            letter-spacing: 1px;
            opacity: 0.7;
        }
        .menu-card:active {
            transform: scale(0.94);
            background: rgba(0, 150, 255, 0.15);
            border-color: #3ebdff;
            box-shadow: 0 0 30px #0088ff55;
        }
        .menu-card.attack { border-left: 4px solid #ff5e7c; }
        .menu-card.blocking { border-left: 4px solid #ffb347; }
        .menu-card.bugging { border-left: 4px solid #6fcf97; }
        .menu-card.extract { border-left: 4px solid #bb86fc; }
        .menu-footer {
            margin-top: 8px;
            font-size: 12px;
            color: #3d7f9e;
            letter-spacing: 2px;
            border-top: 1px solid rgba(0, 200, 255, 0.1);
            padding-top: 20px;
            text-align: center;
            width: 100%;
        }
        .menu-footer i {
            color: #3ebdff;
            margin: 0 4px;
        }
        .glow-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #0099ff33;
            width: 110px;
            height: 110px;
            animation: spinRing 6s linear infinite;
            pointer-events: none;
            opacity: 0.5;
        }
        @keyframes spinRing {
            0% { transform: rotate(0deg) scale(1); opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { transform: rotate(360deg) scale(1.1); opacity: 0.2; }
        }

        /* ===== BLOCKING (DEFENDER) ===== */
        #blockingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 25, 0.95);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
            padding: 30px;
        }
        #blockingOverlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .blocking-box {
            background: rgba(8, 20, 45, 0.95);
            border: 1.5px solid #ffb347;
            border-radius: 30px;
            padding: 35px 25px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px #ffb34722;
        }
        .blocking-box h2 {
            color: #ffb347;
            font-size: 24px;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px #ffb34755;
        }
        .blocking-box .sub {
            color: #d48c3a;
            font-size: 14px;
            margin-bottom: 20px;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .blocking-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 20, 40, 0.8);
            border: 1.5px solid #ffb34766;
            border-radius: 16px;
            color: #ffd7a0;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 3px;
            outline: none;
            transition: 0.2s;
        }
        .blocking-input:focus {
            border-color: #ffb347;
            box-shadow: 0 0 30px #ffb34733;
        }
        .blocking-input::placeholder {
            color: #5a4a3a;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .blocking-btn {
            margin-top: 16px;
            background: transparent;
            border: 1.5px solid #ffb347;
            color: #ffb347;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
            background: rgba(255, 179, 71, 0.05);
            width: 100%;
        }
        .blocking-btn:active {
            transform: scale(0.94);
            background: rgba(255, 179, 71, 0.15);
        }
        .blocking-status {
            margin-top: 16px;
            color: #d48c3a;
            font-size: 15px;
            letter-spacing: 1px;
            min-height: 50px;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
        }
        .shield-break-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .shield-icon {
            font-size: 80px;
            color: #ffb347;
            text-shadow: 0 0 40px #ffb347, 0 0 80px #ffb34755;
            animation: shieldBreak 0.6s ease forwards;
            position: absolute;
        }
        @keyframes shieldBreak {
            0% { transform: scale(0.5) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(20deg); opacity: 1; }
            100% { transform: scale(2) rotate(45deg); opacity: 0; }
        }
        .rush-final {
            color: #ff0000;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 40px #ff0000, 0 0 80px #ff000066;
            animation: finalPulse 0.3s ease infinite alternate;
            font-family: 'Courier New', monospace;
        }
        @keyframes finalPulse {
            0% { transform: scale(1); text-shadow: 0 0 40px #ff0000; }
            100% { transform: scale(1.05); text-shadow: 0 0 80px #ff0000, 0 0 120px #ff000044; }
        }
        .blocking-close-btn {
            margin-top: 16px;
            background: transparent;
            border: 1px solid #ffb34766;
            color: #ffb347;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
            background: rgba(255, 179, 71, 0.05);
            display: none;
            width: 100%;
        }
        .blocking-close-btn.active {
            display: inline-block;
        }
        .blocking-close-btn:active {
            transform: scale(0.94);
            background: rgba(255, 179, 71, 0.15);
        }

        /* ===== EXTRACT ===== */
        .extract-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 25, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 30px;
            padding: 30px;
        }
        .extract-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        .extract-box {
            background: rgba(8, 20, 45, 0.9);
            border: 1px solid #bb86fc;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 60px #bb86fc33;
        }
        .extract-box h2 {
            color: #bb86fc;
            font-size: 22px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #bb86fc55;
        }
        .progress-container {
            width: 100%;
            height: 14px;
            background: #1a2a45;
            border-radius: 30px;
            overflow: hidden;
            margin: 16px 0;
            border: 1px solid #bb86fc44;
        }
        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #6f42c1, #bb86fc, #6f42c1);
            background-size: 200% 100%;
            border-radius: 30px;
            transition: width 0.1s linear;
            animation: shimmer 0.6s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .progress-text {
            color: #a78cd6;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px #bb86fc44;
        }
        .extract-success {
            display: none;
            color: #6fcf97;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 16px;
            text-shadow: 0 0 30px #6fcf9755;
            animation: successPulse 0.8s ease;
        }
        .extract-success.active {
            display: block;
        }
        @keyframes successPulse {
            0% { transform: scale(0.8); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .extract-close-btn {
            margin-top: 24px;
            background: transparent;
            border: 1px solid #bb86fc66;
            color: #bb86fc;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
            background: rgba(187, 134, 252, 0.05);
        }
        .extract-close-btn:active {
            transform: scale(0.94);
            background: rgba(187, 134, 252, 0.15);
        }

        /* ===== ATTACK ===== */
        #attackOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #attackOverlay.active {
            display: flex;
        }
        #attackCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .attack-success {
            position: relative;
            z-index: 10;
            color: #00ff41;
            font-family: 'Courier New', monospace;
            font-size: 48px;
            font-weight: 700;
            text-shadow: 0 0 40px #00ff41, 0 0 80px #00ff4188;
            animation: attackSuccessPulse 0.5s ease;
            letter-spacing: 4px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 50px;
            border-radius: 20px;
            border: 2px solid #00ff4166;
            display: none;
        }
        .attack-success.active {
            display: block;
            animation: attackSuccessPulse 0.5s ease;
        }
        @keyframes attackSuccessPulse {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        .attack-close-btn {
            position: relative;
            z-index: 10;
            margin-top: 40px;
            background: transparent;
            border: 1px solid #00ff4166;
            color: #00ff41;
            padding: 12px 40px;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
            background: rgba(0, 255, 65, 0.05);
            display: none;
        }
        .attack-close-btn.active {
            display: block;
        }
        .attack-close-btn:active {
            transform: scale(0.94);
            background: rgba(0, 255, 65, 0.15);
        }
        @media (max-width: 430px) {
            .cyber-terminal { padding: 20px 12px; }
            .hello-master h1 { font-size: 28px; letter-spacing: 4px; }
            .menu-card i { font-size: 28px; }
            .menu-card span { font-size: 16px; }
            .extract-box { padding: 30px 18px; }
            .attack-success { font-size: 28px; padding: 16px 24px; }
            .blocking-box { padding: 25px 16px; }
            .shield-icon { font-size: 60px; }
        }
    </style>
</head>
<body>
    <div id="blueSplash" class="blue-splash"></div>

    <div class="cyber-terminal">
        <div id="loginScreen" class="screen">
            <div class="fingerprint-glow">
                <div class="glow-ring"></div>
                <div id="blueWave" class="blue-wave"></div>
                <div id="fingerIcon" class="finger-icon">
                    <i class="fas fa-fingerprint"></i>
                </div>
            </div>
            <div class="scan-hint">
                <i class="fas fa-scan"></i> TEKAN SIDIK JARI
            </div>
            <div style="color: #397e9e; font-size: 12px; letter-spacing: 1px; background: #00162255; padding: 6px 20px; border-radius: 40px;">
                <i class="fas fa-shield-alt" style="margin-right: 8px;"></i> biometrik terenkripsi
            </div>
        </div>

        <div id="helloMaster" class="hello-master screen">
            <h1>⚡ HELLO MASTER</h1>
            <button id="continueBtn" class="continue-btn">
                <i class="fas fa-arrow-right"></i> CONTINUE
            </button>
        </div>

        <div id="menuScreen" class="screen">
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; padding: 0 6px;">
                <span style="color: #82c2e0; font-size: 13px; letter-spacing: 2px;">
                    <i class="fas fa-terminal" style="margin-right: 6px;"></i>ROOT
                </span>
                <span style="color: #3d7f9e; font-size: 11px;">
                    <i class="fas fa-circle" style="color: #00ff88; font-size: 8px;"></i> ONLINE
                </span>
            </div>
            <div class="menu-grid">
                <div class="menu-card attack" id="attackBtn">
                    <i class="fas fa-skull-crossbones"></i>
                    <span>ATTACK</span>
                    <small>#exploit</small>
                </div>
                <div class="menu-card blocking" id="blockingBtn">
                    <i class="fas fa-shield-halved"></i>
                    <span>BLOCKING</span>
                    <small>#firewall</small>
                </div>
                <div class="menu-card bugging">
                    <i class="fas fa-bug"></i>
                    <span>BUGGING</span>
                    <small>#spy</small>
                </div>
                <div class="menu-card extract" id="extractBtn">
                    <i class="fas fa-database"></i>
                    <span>EXTRACT</span>
                    <small>#dump</small>
                </div>
            </div>
            <div class="menu-footer">
                <i class="fas fa-lock"></i>  SESSION: MASTER  <i class="fas fa-circle" style="color: #3ebdff; font-size: 6px; margin: 0 6px;"></i>  0x7F
            </div>
        </div>
    </div>

    <!-- EXTRACT OVERLAY -->
    <div id="extractOverlay" class="extract-overlay">
        <div class="extract-box">
            <h2><i class="fas fa-database"></i> EXTRACTING...</h2>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar" style="width: 0%;"></div>
            </div>
            <div id="progressText" class="progress-text">0%</div>
            <div id="extractSuccess" class="extract-success">
                <i class="fas fa-check-circle"></i> Extract file successfully!
            </div>
            <button id="extractCloseBtn" class="extract-close-btn"><i class="fas fa-times"></i> CLOSE</button>
        </div>
    </div>

    <!-- ATTACK OVERLAY -->
    <div id="attackOverlay">
        <canvas id="attackCanvas"></canvas>
        <div id="attackSuccess" class="attack-success">💀 100% SUCCESS</div>
        <button id="attackCloseBtn" class="attack-close-btn"><i class="fas fa-times"></i> CLOSE</button>
    </div>

    <!-- BLOCKING OVERLAY -->
    <div id="blockingOverlay">
        <div class="blocking-box">
            <h2><i class="fas fa-shield-halved"></i> DEFENDER</h2>
            <div class="sub">MASUKKAN KODE AKSES</div>
            <input type="text" id="blockingInput" class="blocking-input" placeholder="ketik kode..." autofocus>
            <button id="blockingSubmitBtn" class="blocking-btn"><i class="fas fa-key"></i> VERIFY</button>
            <div id="blockingStatus" class="blocking-status">⚡ siap</div>
            <button id="blockingCloseBtn" class="blocking-close-btn"><i class="fas fa-times"></i> CLOSE</button>
        </div>
    </div>

    <!-- SHIELD BREAK CONTAINER -->
    <div id="shieldBreakContainer" class="shield-break-container"></div>

    <script>
        (function(){
            "use strict";

            // ========== ELEMENTS ==========
            const loginScreen = document.getElementById('loginScreen');
            const helloMaster = document.getElementById('helloMaster');
            const menuScreen = document.getElementById('menuScreen');
            const fingerIcon = document.getElementById('fingerIcon');
            const blueWave = document.getElementById('blueWave');
            const blueSplash = document.getElementById('blueSplash');
            const continueBtn = document.getElementById('continueBtn');

            // Extract
            const extractBtn = document.getElementById('extractBtn');
            const extractOverlay = document.getElementById('extractOverlay');
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            const extractSuccess = document.getElementById('extractSuccess');
            const extractCloseBtn = document.getElementById('extractCloseBtn');

            // Attack
            const attackBtn = document.getElementById('attackBtn');
            const attackOverlay = document.getElementById('attackOverlay');
            const attackSuccess = document.getElementById('attackSuccess');
            const attackCloseBtn = document.getElementById('attackCloseBtn');
            const canvas = document.getElementById('attackCanvas');
            const ctx = canvas.getContext('2d');

            // Blocking
            const blockingBtn = document.getElementById('blockingBtn');
            const blockingOverlay = document.getElementById('blockingOverlay');
            const blockingInput = document.getElementById('blockingInput');
            const blockingSubmitBtn = document.getElementById('blockingSubmitBtn');
            const blockingStatus = document.getElementById('blockingStatus');
            const blockingCloseBtn = document.getElementById('blockingCloseBtn');
            const shieldContainer = document.getElementById('shieldBreakContainer');

            // ========== STATE ==========
            let isLoggedIn = false;
            let isExtracting = false;
            let isAttacking = false;
            let shieldCount = 0;
            let isRushMode = false;
            let rushInterval = null;
            let isProcessing = false;

            // ========== SPLASH ==========
            function triggerBlueSplash() {
                blueSplash.classList.remove('active');
                void blueSplash.offsetWidth;
                blueSplash.classList.add('active');
                setTimeout(() => {
                    blueSplash.classList.remove('active');
                }, 1200);
            }

            function showHelloMaster() {
                loginScreen.style.display = 'none';
                helloMaster.style.display = 'flex';
                helloMaster.style.animation = 'none';
                void helloMaster.offsetWidth;
                helloMaster.style.animation = 'fadeGlow 0.8s ease';
            }

            function showMenu() {
                helloMaster.style.display = 'none';
                menuScreen.style.display = 'flex';
                menuScreen.style.animation = 'none';
                void menuScreen.offsetWidth;
                menuScreen.style.animation = 'menuSlide 0.5s ease';
            }

            function handleFingerScan() {
                if (isLoggedIn) return;
                blueWave.classList.remove('active');
                void blueWave.offsetWidth;
                blueWave.classList.add('active');
                triggerBlueSplash();
                setTimeout(() => {
                    if (!isLoggedIn) {
                        isLoggedIn = true;
                        showHelloMaster();
                    }
                }, 1000);
            }

            fingerIcon.addEventListener('click', function(e) {
                e.stopPropagation();
                handleFingerScan();
            });
            fingerIcon.addEventListener('touchstart', function(e) {
                e.preventDefault();
                handleFingerScan();
            }, { passive: false });

            continueBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isLoggedIn) showMenu();
            });
            continueBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                if (isLoggedIn) showMenu();
            }, { passive: false });

            // ========== EXTRACT ==========
            function runExtract() {
                if (isExtracting) return;
                isExtracting = true;

                progressBar.style.width = '0%';
                progressText.textContent = '0%';
                extractSuccess.classList.remove('active');
                extractSuccess.style.display = 'none';
                extractOverlay.classList.add('active');

                let progress = 0;
                const duration = 1000;
                const interval = 50;
                const step = (interval / duration) * 100;

                const timer = setInterval(() => {
                    progress += step;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(timer);
                        progressBar.style.width = '100%';
                        progressText.textContent = '100%';
                        extractSuccess.style.display = 'block';
                        setTimeout(() => {
                            extractSuccess.classList.add('active');
                        }, 50);
                        isExtracting = false;
                    } else {
                        progressBar.style.width = progress + '%';
                        progressText.textContent = Math.floor(progress) + '%';
                    }
                }, interval);
            }

            extractBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                runExtract();
            });
            extractBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                runExtract();
            }, { passive: false });

            function closeExtract() {
                extractOverlay.classList.remove('active');
                setTimeout(() => {
                    progressBar.style.width = '0%';
                    progressText.textContent = '0%';
                    extractSuccess.classList.remove('active');
                    extractSuccess.style.display = 'none';
                    isExtracting = false;
                }, 200);
            }

            extractCloseBtn.addEventListener('click', closeExtract);
            extractCloseBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                closeExtract();
            }, { passive: false });

            extractOverlay.addEventListener('click', function(e) {
                if (e.target === extractOverlay) closeExtract();
            });

            // ========== ATTACK ==========
            function initCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function startMatrixRain() {
                if (isAttacking) return;
                isAttacking = true;

                initCanvas();
                attackOverlay.classList.add('active');
                attackSuccess.classList.remove('active');
                attackSuccess.style.display = 'none';
                attackCloseBtn.classList.remove('active');
                attackCloseBtn.style.display = 'none';

                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()';
                const columns = Math.floor(canvas.width / 14);
                const drops = Array(columns).fill(1);

                function drawRain() {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.fillStyle = '#00ff41';
                    ctx.font = '16px monospace';

                    for (let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        const x = i * 14;
                        const y = drops[i] * 16;

                        ctx.fillText(text, x, y);

                        if (y > canvas.height && Math.random() > 0.975) {
                            drops[i] = 0;
                        }
                        drops[i]++;
                    }

                    animationId = requestAnimationFrame(drawRain);
                }

                drawRain();

                setTimeout(() => {
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.9)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    attackSuccess.style.display = 'block';
                    setTimeout(() => {
                        attackSuccess.classList.add('active');
                    }, 50);
                    attackCloseBtn.style.display = 'block';
                    setTimeout(() => {
                        attackCloseBtn.classList.add('active');
                    }, 100);
                    isAttacking = false;
                }, 3000);
            }

            function closeAttack() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                attackOverlay.classList.remove('active');
                attackSuccess.classList.remove('active');
                attackSuccess.style.display = 'none';
                attackCloseBtn.classList.remove('active');
                attackCloseBtn.style.display = 'none';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                isAttacking = false;
            }

            attackBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                startMatrixRain();
            });
            attackBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                startMatrixRain();
            }, { passive: false });

            attackCloseBtn.addEventListener('click', closeAttack);
            attackCloseBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                closeAttack();
            }, { passive: false });

            window.addEventListener('resize', function() {
                if (attackOverlay.classList.contains('active')) {
                    initCanvas();
                }
            });

            // ========== BLOCKING ==========
            function showShieldBreak() {
                const shield = document.createElement('div');
                shield.className = 'shield-icon';
                shield.innerHTML = '<i class="fas fa-shield-halved"></i>';
                shield.style.left = (Math.random() * 70 + 15) + '%';
                shield.style.top = (Math.random() * 70 + 15) + '%';
                shieldContainer.appendChild(shield);

                setTimeout(() => {
                    shield.remove();
                }, 800);
            }

            function updateRushStatus() {
                if (shieldCount < 40) {
                    let msg = '⏳ RUSHING IS ON GOING, PLS CALM DOWN<br>';
                    msg += '<span style="font-size:12px;color:#ffb34777;">shield break: ' + shieldCount + '/40</span>';
                    blockingStatus.innerHTML = msg;
                }
            }

            function startRushMode() {
                isRushMode = true;
                let speed = 200;
                shieldCount = 0;
                shieldContainer.innerHTML = '';

                if (rushInterval) clearInterval(rushInterval);

                function doRush() {
                    if (shieldCount >= 40) {
                        clearInterval(rushInterval);
                        rushInterval = null;
                        isRushMode = false;
                        blockingStatus.innerHTML = '<span class="rush-final">⚠️ YOU ARE RUSH THE SYSTEM</span>';
                        blockingCloseBtn.classList.add('active');
                        blockingCloseBtn.style.display = 'inline-block';
                        isProcessing = false;
                        return;
                    }

                    // 3 shield sekaligus
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            if (shieldCount >= 40) return;
                            showShieldBreak();
                            shieldCount++;
                            updateRushStatus();

                            if (shieldCount >= 40) {
                                clearInterval(rushInterval);
                                rushInterval = null;
                                isRushMode = false;
                                blockingStatus.innerHTML = '<span class="rush-final">⚠️ YOU ARE RUSH THE SYSTEM</span>';
                                blockingCloseBtn.classList.add('active');
                                blockingCloseBtn.style.display = 'inline-block';
                                isProcessing = false;
                            }
                        }, i * 100);
                    }

                    // Percepat
                    if (speed > 50) speed -= 5;
                }

                rushInterval = setInterval(doRush, speed);
            }

            function handleBlocking() {
                if (isProcessing) return;
                isProcessing = true;

                const input = blockingInput.value.trim();
                blockingInput.value = '';

                const hasFunc = input.includes('.(function/dxl)');
                const fCount = (input.match(/f/g) || []).length;

                // SUCCESS
                if (input === 'fff.bench') {
                    blockingStatus.innerHTML = '✅ ACCESS GRANTED!';
                    setTimeout(() => {
                        blockingOverlay.classList.remove('active');
                        blockingCloseBtn.classList.remove('active');
                        blockingCloseBtn.style.display = 'none';
                        shieldCount = 0;
                        isRushMode = false;
                        if (rushInterval) {
                            clearInterval(rushInterval);
                            rushInterval = null;
                        }
                        isProcessing = false;
                        blockingStatus.innerHTML = '⚡ siap';
                        shieldContainer.innerHTML = '';
                    }, 1000);
                    return;
                }

                // RUSH MODE
                if (hasFunc && fCount !== 3) {
                    blockingStatus.innerHTML = '⚡ RUSH MODE ACTIVATED!';
                    shieldCount = 0;
                    shieldContainer.innerHTML = '';
                    startRushMode();
                    isProcessing = false;
                    return;
                }

                // SHIELD PECAH 1X
                if (fCount !== 3) {
                    showShieldBreak();
                    shieldCount++;
                    blockingStatus.innerHTML = '❌ KODE SALAH! Shield pecah! (' + shieldCount + '/40)';

                    if (shieldCount >= 40) {
                        blockingStatus.innerHTML = '<span class="rush-final">⚠️ YOU ARE RUSH THE SYSTEM</span>';
                        blockingCloseBtn.classList.add('active');
                        blockingCloseBtn.style.display = 'inline-block';
                        isProcessing = false;
                        return;
                    }

                    if (hasFunc) {
                        blockingStatus.innerHTML = '⚡ RUSH MODE ACTIVATED!';
                        shieldCount = 0;
                        shieldContainer.innerHTML = '';
                        startRushMode();
                        isProcessing = false;
                        return;
                    }

                    isProcessing = false;
                    return;
                }

                blockingStatus.innerHTML = '❌ KODE TIDAK VALID';
                isProcessing = false;
            }

            // EVENT BLOCKING
            blockingBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                blockingOverlay.classList.add('active');
                blockingInput.value = '';
                blockingStatus.innerHTML = '⚡ siap';
                blockingCloseBtn.classList.remove('active');
                blockingCloseBtn.style.display = 'none';
                shieldCount = 0;
                shieldContainer.innerHTML = '';
                isRushMode = false;
                if (rushInterval) {
                    clearInterval(rushInterval);
                    rushInterval = null;
                }
                isProcessing = false;
                setTimeout(() => blockingInput.focus(), 300);
            });

            blockingBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                blockingBtn.click();
            }, { passive: false });

            blockingSubmitBtn.addEventListener('click', function(e) {
                e.preventDefault();
                handleBlocking();
            });

            blockingInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleBlocking();
                }
            });

            function closeBlocking() {
                blockingOverlay.classList.remove('active');
                blockingCloseBtn.classList.remove('active');
                blockingCloseBtn.style.display = 'none';
                shieldCount = 0;
                isRushMode = false;
                if (rushInterval) {
                    clearInterval(rushInterval);
                    rushInterval = null;
                }
                isProcessing = false;
                blockingStatus.innerHTML = '⚡ siap';
                shieldContainer.innerHTML = '';
            }

            blockingCloseBtn.addEventListener('click', closeBlocking);
            blockingCloseBtn.addEventListener('touchstart', function(e) {
                e.preventDefault();
                closeBlocking();
            }, { passive: false });

            // ========== MENU LAIN ==========
            document.querySelectorAll('.menu-card:not(.extract):not(#attackBtn):not(#blockingBtn)').forEach(card => {
                card.addEventListener('click', function() {
                    this.style.transform = 'scale(0.92)';
                    setTimeout(() => { this.style.transform = ''; }, 150);
                    const smallEl = this.querySelector('small');
                    if (smallEl) {
                        const originalText = smallEl.innerText;
                        smallEl.innerText = '✓ executing';
                        setTimeout(() => { smallEl.innerText = originalText; }, 600);
                    }
                });
            });

            console.log('🔮 CYBER DECK · MASTER siap.');
        })();
    </script>
</body>
</html>
